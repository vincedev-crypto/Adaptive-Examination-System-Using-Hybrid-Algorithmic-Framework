spring.application.name=algo


spring.datasource.url=jdbc:mysql://localhost:3306/adaptiveexam?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# HikariCP Connection Pool - prevents stale connection / Communications link failure errors
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=300000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=5000

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


spring.jpa.properties.hibernate.packagesToScan=com.exam.entity


server.error.include-message=always
server.error.include-stacktrace=on_param

server.port=8080


spring.thymeleaf.cache=false

spring.mail.host=smtp.gmail.com
spring.mail.port=587
